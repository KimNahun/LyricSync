name: LyricSync
options:
  bundleIdPrefix: com.nahun
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true
  developmentLanguage: ko

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: AHW642SXDF
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES

targets:
  LyricSync:
    type: application
    platform: iOS
    bundleId: com.nahun.LyricSync
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nahun.LyricSync
        INFOPLIST_FILE: Sources/Info.plist
        SWIFT_VERSION: "6.0"
    scheme:
      commandLineArguments:
        "-AppleLanguages": "(ko)"
        "-AppleLocale": "ko_KR"
